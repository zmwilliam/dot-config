format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

[directory]
style = "blue"
truncate_to_repo = false

[character]
success_symbol = "[έζψ](purple)"
error_symbol = "[έζψ](red)"
vimcmd_symbol = "[έζχ](green)"

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
style = "bright-black"
ignore_bare_repo = true

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "έΑΜ"
untracked = "έΑΜ"
modified = "έΑΜ"
staged = "έΑΜ"
renamed = "έΑΜ"
deleted = "έΑΜ"
stashed = "έΚκ"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
